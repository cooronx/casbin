name: Build Source Snapshot

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-source-snapshot:
    if: ${{ github.repository == 'apache/casbin' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute snapshot metadata
        id: snapshot
        run: |
          BASE_VERSION="$(
            git ls-remote --tags origin "refs/tags/v*" |
              awk -F'/' '
                {
                  tag = $NF
                  sub(/\^\{\}$/, "", tag)
                  if (tag ~ /^v[0-9]+\.[0-9]+\.[0-9]+$/) {
                    version = substr(tag, 2)
                    split(version, parts, ".")
                    key = sprintf("%09d%09d%09d", parts[1], parts[2], parts[3])
                    if (key > max_key) {
                      max_key = key
                      max_version = version
                    }
                  }
                }
                END {
                  if (max_version == "") {
                    print "0.0.1"
                  } else {
                    split(max_version, parts, ".")
                    printf "%d.%d.%d\n", parts[1], parts[2], parts[3] + 1
                  }
                }
              '
          )"

          LAST_SNAPSHOT_NUMBER="$(
            git ls-remote --tags origin "refs/tags/${BASE_VERSION}-snapshot.*" |
              awk -F'/' '
                {
                  tag = $NF
                  sub(/\^\{\}$/, "", tag)
                  if (tag ~ /^[0-9]+\.[0-9]+\.[0-9]+-snapshot\.[0-9]+$/) {
                    split(tag, version_parts, "-snapshot.")
                    snapshot_number = version_parts[2] + 0
                    if (snapshot_number > max) {
                      max = snapshot_number
                    }
                  }
                }
                END {
                  if (max == "") {
                    print 0
                  } else {
                    print max
                  }
                }
              '
          )"
          NEXT_SNAPSHOT_NUMBER="$((LAST_SNAPSHOT_NUMBER + 1))"
          SNAPSHOT_VERSION="${BASE_VERSION}-snapshot.${NEXT_SNAPSHOT_NUMBER}"
          SNAPSHOT_BASENAME="casbin-${SNAPSHOT_VERSION}-src"

          echo "base_version=${BASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "number=${NEXT_SNAPSHOT_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "version=${SNAPSHOT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "basename=${SNAPSHOT_BASENAME}" >> "${GITHUB_OUTPUT}"

      - name: Generate snapshot notes
        run: |
          {
            echo "# Casbin snapshot ${GITHUB_SHA}"
            echo
            echo "- Release: ${{ steps.snapshot.outputs.version }}"
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Generated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } > SNAPSHOT_NOTES.md

      - name: Create source archives
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix="${{ steps.snapshot.outputs.basename }}/" -o "dist/${{ steps.snapshot.outputs.basename }}.tar.gz" HEAD
          git archive --format=zip --prefix="${{ steps.snapshot.outputs.basename }}/" -o "dist/${{ steps.snapshot.outputs.basename }}.zip" HEAD
          cp SNAPSHOT_NOTES.md dist/

      - name: Generate checksums
        run: |
          (
            cd dist
            sha256sum "${{ steps.snapshot.outputs.basename }}.tar.gz" "${{ steps.snapshot.outputs.basename }}.zip" SNAPSHOT_NOTES.md > checksums.txt
          )

      - name: Create snapshot GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.snapshot.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.snapshot.outputs.version }}
          body_path: SNAPSHOT_NOTES.md
          draft: false
          prerelease: true
          files: |
            dist/${{ steps.snapshot.outputs.basename }}.tar.gz
            dist/${{ steps.snapshot.outputs.basename }}.zip
            dist/checksums.txt
            dist/SNAPSHOT_NOTES.md
